provider:
  name: signoz

resources:
  route_policy:
    create:
      path: /api/v1/route_policies
      method: POST
    read:
      path: /api/v1/route_policies/{id}
      method: GET
    update:
      path: /api/v1/route_policies/{id}
      method: PUT
    delete:
      path: /api/v1/route_policies/{id}
      method: DELETE
    schema:
      ignores:
        - data
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
  planned_maintenance:
    create:
      path: /api/v1/downtime_schedules
      method: POST
    read:
      path: /api/v1/downtime_schedules/{id}
      method: GET
    update:
      path: /api/v1/downtime_schedules/{id}
      method: PUT
    delete:
      path: /api/v1/downtime_schedules/{id}
      method: DELETE
    schema:
      ignores:
        - data
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
  service_account:
    create:
      path: /api/v1/service_accounts
      method: POST
    read:
      path: /api/v1/service_accounts/{id}
      method: GET
    update:
      path: /api/v1/service_accounts/{id}
      method: PUT
    delete:
      path: /api/v1/service_accounts/{id}
      method: DELETE
    schema:
      ignores:
        - data
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
        - serviceAccountRoles
  user:
    create:
      path: /api/v2/users
      method: POST
    read:
      path: /api/v2/users/{id}
      method: GET
    update:
      path: /api/v2/users/{id}
      method: PUT
    delete:
      path: /api/v2/users/{id}
      method: DELETE
    schema:
      ignores:
        - data
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
        - userRoles
        - frontendBaseUrl
  role:
    create:
      path: /api/v1/roles
      method: POST
    read:
      path: /api/v1/roles/{id}
      method: GET
    update:
      path: /api/v1/roles/{id}
      method: PUT
    delete:
      path: /api/v1/roles/{id}
      method: DELETE
    schema:
      ignores:
        - data
        - status
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy

