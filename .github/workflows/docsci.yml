name: docsci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: '1.8.0-alpha20240216'
          terraform_wrapper: false
      - name: generate
        run: go generate ./...
      - name: drift
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Docs are out of date. Run 'go generate ./...' and commit the result."; exit 1)
      - name: validate
        run: go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs validate -provider-name signoz
